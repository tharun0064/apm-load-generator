# New Relic Java Agent Configuration for Analytics Load Generator
# Staging Environment Configuration

common: &default_settings
  # License Key - Replace with your staging license key
  license_key: 'YOUR_LICENSE_KEY_HERE'

  # Application Name
  app_name: 'PAYMENTS'

  # Log Level
  log_level: info

  # STAGING COLLECTOR CONFIGURATION
  # This is the critical setting to point to staging instead of production
  host: 'staging-collector.newrelic.com'
  port: 443

  # Distributed Tracing
  distributed_tracing:
    enabled: true

  # Transaction Tracer
  transaction_tracer:
    enabled: true
    record_sql: obfuscated

  # Database Configuration
  database_name_reporting:
    enabled: true

  datastore_tracer:
    database_name_reporting:
      enabled: true
    instance_reporting:
      enabled: true
