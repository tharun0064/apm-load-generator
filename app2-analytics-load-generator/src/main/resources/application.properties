# Spring Boot Application Configuration for Analytics Load Generator

# Allow circular references for load generator
spring.main.allow-circular-references=true

# Application Name
spring.application.name=Analytics-Load-Generator

# Server Configuration
server.port=${API_PORT:8081}

# Database Configuration
db.url=jdbc:sqlserver://localhost:1433;databaseName=loadtest;encrypt=false;trustServerCertificate=true
db.username=sa
db.password=Anitha@123456
db.pool.max=${DB_POOL_MAX:15}
db.pool.min=${DB_POOL_MIN:5}

# Load Generator Configuration
threads=${THREADS:10}
api.base.url=${API_BASE_URL:http://localhost:8081}

# Actuator Configuration (health checks, metrics)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.root=${NEW_RELIC_LOG_LEVEL:INFO}
logging.level.com.loadgen.analytics=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Disable Spring Boot banner for cleaner logs
spring.main.banner-mode=off
