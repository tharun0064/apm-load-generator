# Oracle Database Configuration for Analytics Application
# You can override these with environment variables

# Database Connection (uses analytics_user with read access to oltp_user schema)
db.url=jdbc:oracle:thin:@localhost:1521:ORCL
db.username=analytics_user
db.password=AnalyticsPass123!

# Connection Pool Settings (optimized for analytical queries)
db.pool.max=50
db.pool.min=10
db.timeout=60000
db.idle.timeout=900000
db.max.lifetime=1800000

# Application Settings
app.threads=20
