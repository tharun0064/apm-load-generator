# Spring Boot Application Configuration for Analytics Load Generator

# Allow circular references for load generator
spring.main.allow-circular-references=true

# Application Name
spring.application.name=Analytics-Load-Generator-3

# Server Configuration
server.port=${API_PORT:8082}

# Database Configuration
db.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/ORCL}
db.username=${DB_USERNAME:analytics_user}
db.password=${DB_PASSWORD:AnalyticsPass123!}
db.pool.max=${DB_POOL_MAX:30}
db.pool.min=${DB_POOL_MIN:5}

# Load Generator Configuration
threads=${THREADS:20}
api.base.url=${API_BASE_URL:http://localhost:8082}

# Actuator Configuration (health checks, metrics)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.root=${NEW_RELIC_LOG_LEVEL:INFO}
logging.level.com.loadgen.analytics=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Disable Spring Boot banner for cleaner logs
spring.main.banner-mode=off
