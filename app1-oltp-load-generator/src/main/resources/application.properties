# Spring Boot Application Configuration for OLTP Load Generator

# Allow circular references for load generator
spring.main.allow-circular-references=true

# Application Name
spring.application.name=OLTP-Load-Generator

# Server Configuration
server.port=${API_PORT:8080}

# Database Configuration
db.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/ORCL}
db.username=${DB_USERNAME:oltp_user}
db.password=${DB_PASSWORD:OltpPass123!}
db.pool.max=${DB_POOL_MAX:30}
db.pool.min=${DB_POOL_MIN:10}

# Load Generator Configuration
threads=${THREADS:25}
api.base.url=${API_BASE_URL:http://localhost:8080}

# Actuator Configuration (health checks, metrics)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.root=${NEW_RELIC_LOG_LEVEL:INFO}
logging.level.com.loadgen.oltp=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Disable Spring Boot banner for cleaner logs
spring.main.banner-mode=off
